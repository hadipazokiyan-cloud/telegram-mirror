name: 🧪 Tests

on:
  push:
    branches: [main]
    paths:
      - 'mirror.py'
      - 'test_mirror.py'
      - 'requirements.txt'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mirror.py'
      - 'test_mirror.py'
      - 'requirements.txt'
      - '.github/workflows/test.yml'
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Offline validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies with retry
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          for attempt in 1 2 3; do
            if python -m pip install -r requirements.txt; then
              exit 0
            fi
            echo "Dependency install failed on attempt ${attempt}; retrying..."
            sleep $((attempt * 10))
          done
          exit 1

      - name: Run offline validation
        run: |
          python -m py_compile mirror.py test_mirror.py
          python -m json.tool posts.json >/dev/null
          python mirror.py --self-test
          python -m unittest -v test_mirror.py
