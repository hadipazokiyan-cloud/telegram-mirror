name: Telegram Mirror Update

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run mirror
        run: |
          python mirror.py

      - name: Commit changes
        run: |
          git config --global user.name "telegram-mirror-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add posts.json

          git diff --staged --quiet || git commit -m "auto update posts"

          git push
