name: 🌐 Deploy to GitHub Pages

on:
  # بعد از هر آپدیت موفق، صفحات را بروزرسانی کن
  workflow_run:
    workflows: ["🔄 Telegram Mirror Auto-Update"]
    types:
      - completed
    branches:
      - main
  
  # هنگام push به main
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'posts.json'
      - 'media/**'
  
  # هر روز یکبار - برای اطمینان
  schedule:
    - cron: '0 */12 * * *'
  
  # اجرای دستی
  workflow_dispatch:

# تنظیمات دسترسی
permissions:
  contents: read
  pages: write
  id-token: write

# فقط یک deployment همزمان
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🏗️ Setup Pages
        uses: actions/configure-pages@v5
      
      - name: 📁 Prepare deployment files
        run: |
          # اطمینان از وجود پوشه‌های مورد نیاز
          mkdir -p website/media
          
          # کپی فایل‌های ضروری
          if [ -f "posts.json" ]; then
            cp posts.json website/posts.json
            echo "✅ Copied posts.json"
          else
            echo "⚠️ posts.json not found, creating empty"
            echo '{"channels":{},"last_update":null}' > website/posts.json
          fi
          
          # کپی فایل‌های مدیا (فقط تصاویر کوچک برای پشتیبانی از Pages)
          if [ -d "media" ]; then
            echo "📁 Copying media files..."
            # کپی فقط فایل‌های کوچک (برای جلوگیری از حجم زیاد)
            find media -type f -size -5M -exec cp {} website/media/ \; 2>/dev/null || true
            MEDIA_COUNT=$(find website/media -type f | wc -l)
            echo "🎨 Copied $MEDIA_COUNT media files"
          fi
          
          # ایجاد فایل index.html برای root
          cat > website/index.html << 'EOF'
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=viewer-advanced.html">
    <title>Telegram Mirror Viewer</title>
</head>
<body>
    <p>در حال انتقال به <a href="viewer-advanced.html">نمایشگر پیشرفته</a>...</p>
</body>
</html>
EOF
          
          # لیست فایل‌ها برای دیباگ
          echo "📋 Files ready for deployment:"
          ls -la website/
      
      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './website'
          retention-days: 7
      
      - name: 🌍 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: ✅ Deployment notification
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Site URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📱 Advanced viewer: ${{ steps.deployment.outputs.page_url }}viewer-advanced.html"
      
      - name: ❌ Deployment failure notification
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the workflow logs for details."
