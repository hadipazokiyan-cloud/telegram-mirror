name: 🌐 Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["🔄 Telegram Mirror Auto-Update"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'viewer-advanced.html'
      - 'posts.json'
      - 'media/**'
      - '.github/workflows/pages.yml'
  schedule:
    - cron: '0 */6 * * *'
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy latest available site
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files defensively
        run: |
          set -e
          mkdir -p website website/media

          if [ -f posts.json ]; then
            cp posts.json website/posts.json
          else
            printf '{"channels": {}, "last_update": null, "last_cleanup": null, "statistics": {}}\n' > website/posts.json
          fi

          if [ -f viewer-advanced.html ]; then
            cp viewer-advanced.html website/viewer-advanced.html
          elif [ ! -f website/viewer-advanced.html ]; then
            cat > website/viewer-advanced.html <<'HTML'
          <!doctype html>
          <html lang="fa" dir="rtl">
          <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Telegram Mirror</title></head>
          <body><h1>آرشیو آماده است</h1><p>فایل نمایشگر اصلی پیدا نشد، اما داده‌ها در posts.json موجود هستند.</p></body>
          </html>
          HTML
          fi

          if [ -d media ]; then
            find media -type f ! -name '*.part' -size -25M | while read -r file; do
              rel="${file#media/}"
              mkdir -p "website/media/$(dirname "$rel")"
              cp "$file" "website/media/$rel"
            done
          fi

          cat > website/index.html <<'HTML'
          <!doctype html>
          <html lang="fa" dir="rtl">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=viewer-advanced.html">
            <title>نمایشگر آینه تلگرام</title>
          </head>
          <body style="direction:rtl;text-align:right;font-family:Tahoma,sans-serif">
            <p>در حال انتقال به <a href="viewer-advanced.html">نمایشگر آرشیو</a>...</p>
          </body>
          </html>
          HTML

          find website -maxdepth 3 -type f | sort | sed -n '1,200p'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website
          retention-days: 7

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployment URL
        if: always()
        run: |
          echo "Deployment URL: ${{ steps.deployment.outputs.page_url }}"
