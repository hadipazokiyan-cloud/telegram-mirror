name: 🔄 Telegram Mirror Auto-Update (No Cache - Debug)

on:
  schedule:
    - cron: '*/30 * * * *'
  
  workflow_dispatch:
    inputs:
      force_clean:
        description: 'پاکسازی کامل و دانلود مجدد'
        required: false
        type: boolean
        default: true  # تغییر به true پیش‌فرض
      debug_mode:
        description: 'حالت دیباگ'
        required: false
        type: boolean
        default: true

  push:
    branches:
      - main
    paths:
      - 'list.txt'
      - 'mirror.py'

env:
  PYTHON_VERSION: '3.11'
  TZ: 'Asia/Tehran'

jobs:
  debug-and-update:
    name: 🔍 Debug & Update (No Cache)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'  # فقط کش pip را نگه می‌داریم

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ============================================
      # 🔥 حذف کامل کش مدیا و دیتابیس
      # ============================================
      - name: 🔥 Clear cache and force refresh
        if: github.event.inputs.force_clean == 'true' || true
        run: |
          echo "=========================================="
          echo "🔥 FORCE CLEANING CACHE"
          echo "=========================================="
          
          # حذف پوشه media
          if [ -d "media" ]; then
            echo "🗑️ Removing media directory..."
            rm -rf media
            echo "✅ Media directory removed"
          fi
          
          # حذف فایل posts.json
          if [ -f "posts.json" ]; then
            echo "🗑️ Removing posts.json..."
            rm -f posts.json
            echo "✅ posts.json removed"
          fi
          
          # حذف کش پایتون
          echo "🗑️ Clearing Python cache..."
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          
          echo "✅ Cache cleared successfully"
          echo "=========================================="

      # ============================================
      # نمایش list.txt
      # ============================================
      - name: 📋 Check list.txt content
        run: |
          echo "=========================================="
          echo "📋 LIST.TXT CONTENT"
          echo "=========================================="
          if [ -f "list.txt" ]; then
            cat list.txt
            echo ""
            echo "Active channels: $(cat list.txt | grep -v '^#' | grep -v '^$' | wc -l)"
          else
            echo "❌ list.txt NOT FOUND!"
            exit 1
          fi

      # ============================================
      # بررسی مستقیم کانال‌ها (بدون کش)
      # ============================================
      - name: 🔍 Test channels directly (no cache)
        run: |
          echo "=========================================="
          echo "🔍 TESTING CHANNELS DIRECTLY"
          echo "=========================================="
          
          python3 << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          
          channels = []
          with open('list.txt', 'r') as f:
              for line in f:
                  line = line.strip()
                  if line and not line.startswith('#'):
                      channels.append(line.replace('@', ''))
          
          print(f"\nTesting {len(channels)} channels...\n")
          
          for channel in channels:
              try:
                  url = f"https://t.me/s/{channel}"
                  resp = requests.get(url, timeout=15)
                  
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      posts = soup.select('.tgme_widget_message')
                      latest_id = None
                      
                      if posts:
                          data_post = posts[0].get('data-post', '')
                          if '/' in data_post:
                              latest_id = data_post.split('/')[-1]
                      
                      print(f"✅ @{channel}: {len(posts)} posts (latest: {latest_id})")
                  else:
                      print(f"❌ @{channel}: HTTP {resp.status_code}")
                      
              except Exception as e:
                  print(f"❌ @{channel}: {str(e)[:50]}")
          EOF
          
          echo "=========================================="

      # ============================================
      # ایجاد پوشه‌ها
      # ============================================
      - name: 📁 Create directories
        run: |
          mkdir -p media/{images,videos,audios,documents,archives,applications,code,other}
          mkdir -p website
          echo "✅ Directories created"

      # ============================================
      # اجرای اسکریپت (بدون کش)
      # ============================================
      - name: 🏃 Run mirror script (no cache)
        id: mirror
        continue-on-error: false
        run: |
          echo "=========================================="
          echo "🚀 STARTING MIRROR SCRIPT (NO CACHE)"
          echo "=========================================="
          echo "Start time: $(date)"
          echo ""
          
          # اجرای اسکریپت با خروجی کامل
          python mirror.py 2>&1 | tee mirror_output.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          echo ""
          echo "Exit code: $EXIT_CODE"
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Script completed"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Script failed"
            echo "success=false" >> $GITHUB_OUTPUT
          fi
          
          echo ""
          echo "📝 Last 30 lines:"
          tail -30 mirror_output.log

      # ============================================
      # بررسی نتایج
      # ============================================
      - name: 📊 Check results
        if: always()
        run: |
          echo "=========================================="
          echo "📊 RESULTS"
          echo "=========================================="
          
          if [ -f "posts.json" ]; then
            echo "✅ posts.json created/updated"
            echo "Size: $(du -sh posts.json | cut -f1)"
            
            python3 << 'EOF'
            import json
            with open('posts.json', 'r') as f:
                data = json.load(f)
            channels = data.get('channels', {})
            print(f"\n📺 Channels in database: {len(channels)}")
            for ch, posts in channels.items():
                print(f"   @{ch}: {len(posts)} posts")
                if posts:
                    latest = max(p['id'] for p in posts)
                    print(f"      Latest post ID: {latest}")
            EOF
          else:
            echo "⚠️ posts.json not found - SCRIPT MAY HAVE FAILED"
          
          echo ""
          echo "📁 Media files:"
          if [ -d "media" ]; then
            find media -type f | head -20 || echo "No media files"
            echo ""
            echo "Total: $(find media -type f | wc -l) files"
          fi

      # ============================================
      # بررسی تغییرات
      # ============================================
      - name: 🔍 Check for changes
        id: changes
        run: |
          git add posts.json media/ website/
          
          if git diff --staged --quiet; then
            echo "📭 No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "📝 Changes detected!"
            git diff --staged --stat
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # ============================================
      # Commit و push
      # ============================================
      - name: 💾 Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          git commit -m "🔄 Auto-update: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "✅ Push successful"

      # ============================================
      # ذخیره لاگ
      # ============================================
      - name: 📦 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: |
            mirror_output.log
            posts.json
          retention-days: 3
