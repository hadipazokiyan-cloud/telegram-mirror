name: 🔄 Telegram Mirror Auto-Update

on:
  schedule:
    - cron: '*/30 * * * *'
    - cron: '0 */6 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      post_limit:
        description: 'Posts checked per channel'
        required: false
        default: '30'
      keep_posts:
        description: 'Posts kept per channel'
        required: false
        default: '100'
      no_media:
        description: 'Run without downloading media'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'list.txt'
      - 'mirror.py'
      - 'test_mirror.py'
      - 'requirements.txt'
      - '.github/workflows/update.yml'

permissions:
  contents: write
  actions: read

concurrency:
  group: telegram-mirror-update
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_DIR: ~/.cache/pip
  TELEGRAM_MIRROR_TIMEOUT: '60'
  TELEGRAM_MIRROR_RETRIES: '3'
  TELEGRAM_MIRROR_POST_LIMIT: ${{ github.event.inputs.post_limit || '30' }}
  TELEGRAM_MIRROR_KEEP_POSTS: ${{ github.event.inputs.keep_posts || '100' }}
  TELEGRAM_MIRROR_MAX_FILE_MB: '100'
  TELEGRAM_MIRROR_MAX_TOTAL_MB: '500'
  TELEGRAM_MIRROR_CHANNEL_WORKERS: '1'
  TELEGRAM_MIRROR_DOWNLOAD_WORKERS: '3'
  TELEGRAM_MIRROR_DELAY_MIN: '1'
  TELEGRAM_MIRROR_DELAY_MAX: '4'
  TELEGRAM_MIRROR_CLEANUP_ORPHANS: 'true'

jobs:
  update-mirror:
    name: Update mirror safely
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies with retry
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          for attempt in 1 2 3; do
            if python -m pip install -r requirements.txt; then
              exit 0
            fi
            echo "Dependency install failed on attempt ${attempt}; retrying..."
            sleep $((attempt * 15))
          done
          exit 1

      - name: Prepare runtime files
        run: |
          mkdir -p media logs backups _cache_html
          if [ ! -f posts.json ]; then
            printf '{"channels": {}, "last_update": null, "last_cleanup": null, "statistics": {}}\n' > posts.json
          fi
          if [ ! -f list.txt ]; then
            touch list.txt
          fi

      - name: Offline validation
        id: validation
        continue-on-error: true
        run: |
          python -m py_compile mirror.py test_mirror.py
          python -m json.tool posts.json >/dev/null
          python mirror.py --self-test
          python -m unittest -v test_mirror.py

      - name: Run mirror with retries
        id: mirror
        env:
          NO_MEDIA_INPUT: ${{ github.event.inputs.no_media || 'false' }}
        run: |
          set +e
          mkdir -p logs
          args=""
          if [ "$NO_MEDIA_INPUT" = "true" ]; then
            args="--no-media"
          fi

          success=false
          delays="30 60 120"
          attempt=1
          for delay in $delays; do
            echo "Mirror attempt ${attempt}/3 with args: ${args}" | tee -a logs/mirror_output.log
            python mirror.py $args 2>&1 | tee -a logs/mirror_output.log
            status=${PIPESTATUS[0]}
            if [ "$status" -eq 0 ]; then
              success=true
              break
            fi
            echo "Attempt ${attempt} failed with status ${status}; sleeping ${delay}s" | tee -a logs/mirror_output.log
            sleep "$delay"
            attempt=$((attempt + 1))
          done

          if [ "$success" != "true" ] && [ "$NO_MEDIA_INPUT" != "true" ]; then
            echo "Primary run failed; trying safe fallback without media and cleanup" | tee -a logs/mirror_output.log
            python mirror.py --no-media --no-cleanup 2>&1 | tee -a logs/mirror_output.log
            status=${PIPESTATUS[0]}
            if [ "$status" -eq 0 ]; then
              success=true
            fi
          fi

          echo "success=${success}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write run summary
        if: always()
        run: |
          mkdir -p logs
          {
            echo "Last run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Workflow: $GITHUB_RUN_ID"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Validation: ${{ steps.validation.outcome }}"
            echo "Mirror success: ${{ steps.mirror.outputs.success || 'false' }}"
            echo "Media files: $(find media -type f ! -name '*.part' 2>/dev/null | wc -l)"
            echo "Media size: $(du -sh media 2>/dev/null | cut -f1 || echo 0)"
          } > logs/last_run.txt

      - name: Repair invalid posts.json as last resort
        if: always()
        run: |
          if ! python -m json.tool posts.json >/dev/null 2>&1; then
            mkdir -p backups
            cp posts.json "backups/posts_invalid_${GITHUB_RUN_ID}.json" || true
            printf '{"channels": {}, "last_update": null, "last_cleanup": null, "statistics": {}}\n' > posts.json
            echo "posts.json was invalid and has been replaced with an empty database" >> logs/last_run.txt
          fi

      - name: Commit and push changes
        if: always()
        run: |
          set +e
          git add posts.json media logs/last_run.txt 2>/dev/null
          if [ -d backups ]; then
            find backups -maxdepth 1 -type f -name "*.json" -print0 | xargs -0 -r git add
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "🔄 Auto-update Telegram mirror"

          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; rebasing and retrying"
            git pull --rebase --autostash origin main || true
            sleep $((attempt * 20))
          done
          echo "Push failed after retries"
          exit 0

      - name: Upload debug artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-mirror-debug-${{ github.run_id }}
          path: |
            logs/
            backups/
            posts.json
          if-no-files-found: ignore
          retention-days: 7
