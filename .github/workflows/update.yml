name: Update Telegram Mirror

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"   # اجرای خودکار هر ۲ ساعت

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # 1. Checkout Repository
      # ------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------
      # 2. Setup Python (Safe on Node 24)
      # ------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ------------------------------
      # 3. Install Dependencies
      # ------------------------------
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ------------------------------
      # 4. Debug Repo Structure
      # ------------------------------
      - name: Debug directory structure
        run: |
          echo "==== Repository Structure ===="
          ls -R .

      # ------------------------------
      # 5. Run Mirror Script
      # ------------------------------
      - name: Execute mirror.py
        run: |
          echo "Running mirror.py..."
          python3 mirror.py || (echo "❌ mirror.py failed" && exit 1)

      # ------------------------------
      # 6. Commit & Push changes
      # ------------------------------
      - name: Commit & Push updates
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected — nothing to commit."
          else
            git commit -m "Mirror Update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

      # ------------------------------
      # 7. Completion Message
      # ------------------------------
      - name: Job Completed
        run: echo "✔️ Telegram Mirror Update Finished Successfully."
