name: Telegram Mirror Update

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Ensure required files
        run: |
          test -f list.txt || (echo "list.txt not found" && exit 1)
          test -f posts.json || echo '{ "channels": {} }' > posts.json
          mkdir -p media

      - name: Run mirror
        run: |
          python mirror.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "mirror-bot"
          git config --global user.email "mirror-bot@users.noreply.github.com"

          git add posts.json media

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update posts and media"
            git push
          fi
