name: Update Telegram Mirror (Debug Mode)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug directory
        run: |
          echo "=== CURRENT DIRECTORY ==="
          pwd
          echo "=== FILES ==="
          ls -R
          echo "=== posts.json exists? ==="
          cat posts.json || echo "posts.json not found"
          echo "=== media folder exists? ==="
          ls media || echo "media not found"

      - name: Run mirror.py
        run: |
          echo "=== Running mirror.py ==="
          python mirror.py

      - name: Commit changes
        run: |
          git config --global user.name "mirror-bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "Update mirror" || echo "No changes to commit"
          git push
