name: 🔄 Telegram Mirror Auto-Update

on:
  schedule:
    # اجرا هر 30 دقیقه
    - cron: '*/30 * * * *'
  
  # اجرای دستی از گیت‌هاب
  workflow_dispatch:
    inputs:
      force_clean:
        description: 'پاکسازی کامل کش و دانلود مجدد'
        required: false
        type: boolean
        default: false

  # اجرا هنگام تغییر فایل‌های کلیدی
  push:
    branches:
      - main
    paths:
      - 'list.txt'
      - 'mirror.py'
      - 'requirements.txt'

env:
  PYTHON_VERSION: '3.11'
  TZ: 'Asia/Tehran'

jobs:
  update-mirror:
    name: 🚀 Update Telegram Channels
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      # ============================================
      # 1. Checkout کد
      # ============================================
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      # ============================================
      # 2. Setup Python با کش
      # ============================================
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # ============================================
      # 3. تنظیم زمان ایران
      # ============================================
      - name: 🕐 Set timezone
        run: |
          sudo timedatectl set-timezone ${{ env.TZ }}
          date

      # ============================================
      # 4. نصب وابستگی‌ها
      # ============================================
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ============================================
      # 5. پاکسازی اجباری (در صورت درخواست)
      # ============================================
      - name: 🔥 Force clean (if requested)
        if: github.event.inputs.force_clean == 'true'
        run: |
          echo "🧹 Force cleaning cache and old data..."
          rm -rf media/*
          rm -f posts.json
          rm -rf __pycache__
          echo "✅ Clean completed"

      # ============================================
      # 6. ایجاد پوشه‌های لازم
      # ============================================
      - name: 📁 Create directories
        run: |
          mkdir -p media/{images,videos,audios,documents,archives,applications,code,other}
          mkdir -p website
          mkdir -p logs

      # ============================================
      # 7. نمایش لیست کانال‌ها (برای دیباگ)
      # ============================================
      - name: 📋 Display channel list
        run: |
          echo "=========================================="
          echo "Active channels in list.txt:"
          echo "=========================================="
          cat list.txt | grep -v '^#' | grep -v '^$' || echo "No channels found!"
          echo "=========================================="

      # ============================================
      # 8. اجرای اسکریپت اصلی
      # ============================================
      - name: 🏃 Run mirror script
        id: mirror
        continue-on-error: false
        run: |
          echo "🚀 Starting mirror script at $(date)"
          python mirror.py
          echo "✅ Mirror script completed at $(date)"

      # ============================================
      # 9. بررسی تغییرات
      # ============================================
      - name: 🔍 Check for changes
        id: changes
        run: |
          git add posts.json media/ website/
          
          if git diff --staged --quiet; then
            echo "📭 No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "📝 Changes detected!"
            git diff --staged --stat
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # ============================================
      # 10. Commit و Push (در صورت وجود تغییر)
      # ============================================
      - name: 💾 Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          git commit -m "🔄 Auto-update: $(date +'%Y-%m-%d %H:%M:%S')"
          
          # تلاش برای push با 3 بار retry
          for i in 1 2 3; do
            if git push origin main; then
              echo "✅ Push successful!"
              break
            else
              echo "⚠️ Push attempt $i failed, retrying..."
              sleep 5
              git pull --rebase origin main
            fi
          done

      # ============================================
      # 11. نمایش آمار نهایی
      # ============================================
      - name: 📊 Show statistics
        if: always()
        run: |
          echo "=========================================="
          echo "📊 FINAL STATISTICS"
          echo "=========================================="
          
          if [ -f "posts.json" ]; then
            echo "📁 posts.json size: $(du -sh posts.json | cut -f1)"
            echo "📺 Channels in DB: $(python -c "import json; print(len(json.load(open('posts.json'))['channels']))" 2>/dev/null || echo 'Error')"
          fi
          
          if [ -d "media" ]; then
            echo "📁 Media files: $(find media -type f 2>/dev/null | wc -l)"
            echo "💾 Media size: $(du -sh media 2>/dev/null | cut -f1)"
          fi
          
          echo "=========================================="

      # ============================================
      # 12. ذخیره لاگ در صورت خطا
      # ============================================
      - name: 📦 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: |
            mirror_output.log
            posts.json
            list.txt
          retention-days: 3
