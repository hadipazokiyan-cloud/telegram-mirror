name: 💚 Repository Keep-Alive

on:
  schedule:
    - cron: '*/30 * * * *'
    - cron: '0 */6 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: repository-keep-alive
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'

jobs:
  keep-alive:
    name: Keep repository active
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Lightweight health check
        id: health
        continue-on-error: true
        run: |
          mkdir -p logs media
          python -m py_compile mirror.py || true
          if [ -f posts.json ]; then
            python -m json.tool posts.json >/dev/null || true
          else
            printf '{"channels": {}, "last_update": null, "last_cleanup": null, "statistics": {}}\n' > posts.json
          fi
          test -s list.txt || true

      - name: Update heartbeat files
        if: always()
        run: |
          mkdir -p logs
          NOW="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          MEDIA_COUNT="$(find media -type f ! -name '*.part' 2>/dev/null | wc -l)"
          MEDIA_SIZE="$(du -sh media 2>/dev/null | cut -f1 || echo 0)"
          LAST_COMMIT="$(git log -1 --format='%h - %s (%ar)' 2>/dev/null || echo 'unknown')"

          cat > .alive <<EOF
          # Telegram Mirror Heartbeat

          Last check: ${NOW}
          Repository: ${GITHUB_REPOSITORY}
          Workflow run: ${GITHUB_RUN_ID}
          Health check: ${{ steps.health.outcome }}
          Media files: ${MEDIA_COUNT}
          Media size: ${MEDIA_SIZE}
          Last commit: ${LAST_COMMIT}
          Status: active
          EOF

          cat > logs/heartbeat.json <<EOF
          {
            "last_check": "${NOW}",
            "repository": "${GITHUB_REPOSITORY}",
            "run_id": "${GITHUB_RUN_ID}",
            "health": "${{ steps.health.outcome }}",
            "media_files": ${MEDIA_COUNT},
            "media_size": "${MEDIA_SIZE}"
          }
          EOF

      - name: Commit heartbeat with retry
        if: always()
        run: |
          set +e
          git add .alive logs/heartbeat.json posts.json 2>/dev/null
          if git diff --staged --quiet; then
            echo "No heartbeat changes"
            exit 0
          fi

          git config --local user.name "keep-alive[bot]"
          git config --local user.email "keep-alive[bot]@users.noreply.github.com"
          git commit -m "💚 Keep repository alive"

          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Heartbeat pushed"
              exit 0
            fi
            echo "Heartbeat push failed on attempt ${attempt}; rebasing and retrying"
            git pull --rebase --autostash origin main || true
            sleep $((attempt * 15))
          done
          echo "Heartbeat push failed after retries"
          exit 0
